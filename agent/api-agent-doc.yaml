      required: [profile_id, internal_code]

    Refund:
      type: object
      description: Datos de una devolución asociada a la orden
      properties:
        internal_code: { type: string, example: TPV211214594 }
        amount: { type: string, example: '0.01' }
        status: { type: string, example: accepted }
        notes: { type: string, nullable: true }
        evidence_of_refund_file: { type: string, format: uri, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ListTPVSettlementOperationsRequest:
      type: object
      properties:
        filters:
          type: array
          description: |
            Filtros opcionales. Claves sugeridas: status, currency, company_name, period_date_end (rango con date/dateTo), paid_date (rango), notified (true/false).
            Formato de filtros: array de objetos con una sola clave cada uno, igual que en listados de TPV.
          items:
            type: object
            additionalProperties: true
        sort:
          type: string
          description: |
            Campo de ordenación (por defecto created_at).
            Soportados: created_at, paid_date, period_date_end, company_name, currency.
          example: created_at
        dir:
          type: string
          enum: [ASC, DESC]
          example: DESC
        page:
          type: integer
          example: 1
        page_size:
          type: integer
          example: 100

    SettlementOperationListItem:
      type: object
      properties:
        code: { type: string, example: TPV.xCe41.639 }
        status: { type: string, example: 'paid out' }
        currency: { type: string, example: EUR }
        company_name: { type: string, example: 'FINTECH.' }
        period_date_end: { type: string, example: '2025-10-22 00:00:00' }
        paid_date: { type: string, example: '2025-10-23' }
        notified: { type: boolean, example: false }
        created_at: { type: string, format: date-time }

    SettlementOperationsListResponse:
      type: object
      properties:
        code: { type: integer, example: 200 }
        message: { type: string, example: success }
        result:
          type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/SettlementOperationListItem'
            pagination:
              $ref: '#/components/schemas/Pagination'

    GetTPVSettlementOperationRequest:
      type: object
      properties:
        code:
          type: string
          description: Código público de la liquidación TPV (p.ej. TPV.D3CrZ.596)
      required: [code]

    PaymentSettlementTransaction:
      type: object
      properties:
        id: { type: integer, example: 306418 }
        amount: { type: number, example: 45 }
        description: { type: string, example: 'TPV.D3CrZ.596 - FINTECH.' }
        date: { type: string, format: date-time }

    PaymentSettlementInvoice:
      type: object
      properties:
        number: { type: string, example: FVW-25-17849 }
        file_url: { type: string, format: uri }

    PaymentSettlementDetails:
      type: object
      properties:
        account: { type: string, example: ES4469000011560100000000 }
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/PaymentSettlementTransaction'

    PaymentSettlement:
      type: object
      properties:
        method: { type: string, example: wallet }
        amount: { type: string, example: '44.60' }
        currency: { type: string, example: EUR }
        date: { type: string, example: '2025-09-01' }
        details: { $ref: '#/components/schemas/PaymentSettlementDetails' }
        invoice: { $ref: '#/components/schemas/PaymentSettlementInvoice' }
        evidence_url: { type: string, format: uri }

    SettlementOperationDetail:
      type: object
      properties:
        code: { type: string, example: TPV.D3CrZ.596 }
        status: { type: string, example: 'paid out' }
        currency: { type: string, example: EUR }
        company_name: { type: string, example: 'FINTECH.' }
        company_address: { type: string }
        first_name: { type: string }
        last_name: { type: string }
        period_date_end: { type: string, example: '31.08.2025', description: 'Fin de periodo (formato dd.MM.yyyy)' }
        paid_date: { type: string, example: '2025-09-01' }
        notified: { type: boolean }
        created_at: { type: string, format: date-time }
        commission: { type: string, example: '0.90' }
        rate: { type: string, example: '1.00' }
        fee: { type: string, example: '-0.40' }
        fee_eur: { type: string, example: '-0.40' }
        line_before_txt: { type: string }
        line_before_value: { type: string, example: '0.00' }
        line_after_txt: { type: string }
        line_after_value: { type: string, example: '0.00' }
        sub_total: { type: string, example: '-0.40' }
        sub_total_eur: { type: string, example: '-0.40' }
        pay: { type: string, example: '44.60' }
        pay_eur: { type: string, example: '44.60' }
        total: { type: string, example: '45.00' }
        total_eur: { type: string, example: '45.00' }
        payment: { $ref: '#/components/schemas/PaymentSettlement' }
        file_url: { type: string, format: uri }

    SettlementOperationResponse:
      type: object
      properties:
        code: { type: integer, example: 200 }
        message: { type: string, example: success }
        result:
          $ref: '#/components/schemas/SettlementOperationDetail'

    CompanyRequestRefundTPVRequest:
      type: object
      properties:
        session_token:
          type: string
          description: Token emitido tras completar el login OTP de la compañía
        amount_cents:
          type: integer
          description: Importe a reembolsar en céntimos (>0)
          example: 1
        internal_code:
          type: string
          description: Código interno de la orden TPV a reembolsar
          example: TPV211214594
      required: [session_token, amount_cents, internal_code]

    CompanyRefund:
      type: object
      properties:
        id: { type: string, example: '500' }
        internal_code: { type: string, example: TPV211214594 }
        amount: { type: string, example: '0.01' }
        status: { type: string, example: pending }
        notes: { type: string, nullable: true }
        evidence_of_refund_file:
          type: string
          format: uri
          nullable: true
          example: 'https://api.revolupay.com/global/uploads/upl_691b1acf055036.76547191.pdf'
        created_at: { type: string, format: date-time, example: '2025-11-17 07:47:53' }
        updated_at: { type: string, format: date-time, example: '2025-11-17 07:47:53' }
        deleted: { type: string, example: '0' }

    CompanyRequestRefundTPVResponse:
      type: object
      properties:
        code: { type: integer, example: 200 }
        message: { type: string, example: success }
        result:
          $ref: '#/components/schemas/CompanyRefund'

    ListCoreTransactionsRequest:
      type: object
      properties:
        id:
          type: integer
          description: Identificador interno de la compañía (profile_foreign_company)
