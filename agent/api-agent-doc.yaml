openapi: 3.0.2
info:
  title: RevoluPAY Agent API
  version: 1.0.0
  description: |
    API para agentes que gestionan compañías en RevoluPAY.
    Requiere autenticación por API Key y expone operaciones para crear/modificar compañías,
    gestionar documentos, listar/consultar, iniciar login OTP de empresa y crear órdenes TPV
    usando el token de sesión emitido por dicho login.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
tags:
  - name: login
    description: 'Returns authentication object that contains valid token for the rest of the API calls.'
  - name: company
    description: Operaciones sobre compañías gestionadas por el agente
  - name: files
    description: Subida y asociación de ficheros KYB/KYC a la compañía
  - name: login_init
    description: Flujo de login iniciado por el agente para usuarios de la compañía (OTP)
  - name: tpv
    description: Creación de órdenes TPV usando tokens de sesión de compañía
  - name: settlement
    description: Liquidaciones TPV (cierres y pagos)
servers:
  - url: /api/agent
    description: Base path

paths:
  /login:
    get:
      tags:
        - login
      summary: 'Returns authentication object that contains valid token for the rest of the API calls.'
      description: ''
      operationId: login
      parameters:
        - name: x-api-key
          in: header
          description: API Key del agente
          required: true
          schema:
            type: string
        - name: rv-authorization
          in: header
          description: Base64 encode de user:password para la aplicación
          required: true
          schema:
            type: string
      security:
        - api_key: []
      responses:
        '200':
          description: Successfully login
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      status:
                        type: integer
                        default: 200
                      message:
                        type: string
                      token:
                        type: string
        '401':
          description: Usuario no autorizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      status:
                        type: integer
                        default: 204
                      message:
                        type: string
        '500':
          description: Error interno
