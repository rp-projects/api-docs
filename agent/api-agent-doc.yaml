        filters:
          type: array
          description: |
            Filtros aplicados al listado. Estructura: array de objetos con UNA sola clave cada uno.
            Claves permitidas y su semántica:
            - internal_code (string): igualdad exacta sobre el código interno.
            - service_status (string): estado de la orden (LIKE en base de datos). Valores habituales: pending, accepted, refused, 'paid out'.
            - currency_code (string): divisa (LIKE), p.ej. EUR, USD.
            - date (string date-time): inicio de rango, compara created_at >= date.
            - dateTo (string date-time): fin de rango, compara created_at <= dateTo.
            - code (string): código público de la orden (LIKE).
            - id (string|integer): id interno de la orden (LIKE).
            Nota: profile_id/profile_type y environment se establecen internamente; no es necesario enviarlos como filtros.
          items:
            type: object
            additionalProperties: true
        sort:
          type: string
          description: |
            Campo de ordenación (por defecto "id"). Soportados: id, created_at, service_status, currency_code.
          example: id
        dir:
          type: string
          description: Dirección de ordenación
          enum: [ASC, DESC]
          example: ASC
        page:
          type: integer
          description: Número de página (>=1)
