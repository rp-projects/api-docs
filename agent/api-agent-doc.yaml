components:
  securitySchemes:
    api_key:
      type: apiKey
      name: x-api-key
      in: header

  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          example: 400
        message:
          type: string
          example: Validation error details

    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        page_size:
          type: integer
          example: 20
        total:
          type: integer
          example: 137

    AgentCreateCompanyRequest:
      type: object
      properties:
        company_name: { type: string, example: ACME Corp }
        core_kyb_profile_type_client: { type: string, description: Tipo de cliente (catálogo interno),enum: [PYME_PRIVATE_COMPANY, PYME_PUBLIC_COMPANY,PYME_MIXED_COMPANY,COMPANIES_PRIVATE_COMPANY,COMPANIES_PUBLIC_COMPANY,COMPANIES_MIXED_COMPANY], example: PYME_PRIVATE_COMPANY }
        registration_number: { type: string, example: B12345678 }
        address_country: { type: string, description: ISO2, example: ES }
        address_city: { type: string, example: Madrid }
        address_province: { type: string, example: Madrid }
        address_zip_code: { type: string, example: '28001' }
        address_street_name: { type: string, example: Gran Via }
        address_line: { type: string, example: '12, 3ºB' }
        bank_name: { type: string, example: MyBank }
        bank_phone: { type: string, example: '+34 600000000' }
        account_number: { type: string, example: 'ES7620770024003102575766' }
        routing_number: { type: string, example: '123456789' }
        swift: { type: string, example: CHASUS33 }
        iban: { type: string, example: ES9121000418450200051332 }
        bank_address_country: { type: string, example: ES }
        bank_address_city: { type: string, example: Madrid }
        bank_address_province: { type: string, example: Madrid }
        bank_address_zip_code: { type: string, example: '28001' }
        bank_address_street_name: { type: string, example: Serrano }
