        destination_name: { type: string, nullable: true, example: 'REVOLUPAY *COMISIÓN POR SERVICIOS*' }
        destination_tag: { type: string, nullable: true }
        destination_currency: { type: string, nullable: true, example: EUR }
        destination_amount: { type: number, nullable: true, example: 96.67 }
        destination_phone: { type: string, nullable: true }
        destination_activity: { type: string, nullable: true }
        amount: { type: number, example: 96.67 }
        fee: { type: number, nullable: true, example: 0 }
        exchange_rate: { type: number, nullable: true }
        location_id: { type: integer, nullable: true, example: 310 }
        location_name: { type: string, nullable: true, example: 'FINTECH TEST, S.L.' }
        business_id: { type: integer, nullable: true, example: 275 }
        business_name: { type: string, nullable: true, example: 'FINTECH TEST, S.L.' }
