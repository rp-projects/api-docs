          description: Token required to tokenize customer cards
          example: 05e3d31577277f9376ab5f5397304107d73f0eb11c501c3b3255f5fe111e707a64c3ddf7f7cc7f25d141cdb1c53deff04bc2a16c57c6b42935d68aa8ab353cd6
         
    OrderRequest:
      type: object
      properties:
        currency:
          type: string
          description: Currency in which the charge will be made
          enum: [EUR]
          example: EUR
        amount:
          type: number
          format: integer
          description: Amount in cents in which the charge will be made
          example: 1020
        description:
          type: string
          description: Concept for which the charge is made 
          example: Rocker T-shirt x 1
        order_ext_id: 
          type: string
          description: 'External identifier of the order, is usually the order identifier in the system of the user of this API.'
          example: RTH-000001
        customer_ext_id:
          type: string
          description: Unique identifier of the client on the system consuming the API.
          example: CL1-000-CV-98
        source_uuid:
          type: string
          description: Tokenized card identifier.
          example: 77777777-7777-4777-9777-777777777777
        url_post:
          type: string
          description: Notification url where the API will send the result via POST once the sender makes the payment.
          example: https://midominio.com/guid/ghhghx0987ffe
        url_ok:
          type: string
          description: url to which the sender will be redirected when the payment is successful 
          example: https://midominio.com/guid/ghhghx0987ffe
        url_ko:
          type: string
          description: url to which the sender will be redirected when the payment is not successful 
          example: https://midominio.com/guid/ghhghx0987ffe 
        clientFirstName:
          type: string
          description: Cardholder name. Field required by VISA. 
          example: Alan
        clientLastName:
          type: string
          description: cardholder's last name. Field required by VISA. 
          example: Brito Prieto
        clientEmail:
          type: string
          description: cardholder's email. Field required by VISA. 
          example: alan.brito.prieto@example.com
        clientPhonePrefix:
          type: number
          description: Telephone prefix of the cardholder. Field required by VISA. It is recommended that at least an e-mail or telephone number be sent 
          example: 34
        clientPhoneNumber:
          type: number
          description: Telephone number of the cardholder. Field required by VISA. It is recommended that at least an e-mail or telephone number be sent 
          example: 938930586
        clientAddressCity:
          type: string
          description: Billing address city. Field required by VISA.
          example: Sant Cugat del Vallés.
        clientAddressCountryISO3:
          type: string
          description: Country of billing address, ISO 3 format. Field required by VISA.
          example: ESP
        clientAddress:
          type: string
          description: Billing address. Field required by VISA.
          example: Vallespir, 19 1
        clientAddressZip:
          type: string
          description: Billing address zip code. Field required by VISA.
          example: '08173'
        clientAddressState:
          type: string
          description: State/province of billing address. Field required by VISA.
          example: Barcelona
      required:
      - currency
      - amount
      - description
      
