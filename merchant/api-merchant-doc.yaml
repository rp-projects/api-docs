openapi: 3.0.2
info:
  title: RevoluPAY Merchant API
  version: 1.0.0
  description: "Merchant TPV service for registered businesses."
  license:
    name: Apache 2.0
    url: 'http://www.apache.org/licenses/LICENSE-2.0.html'
tags:
  - name: login
    description: 'Returns authentication object that contains valid token for the rest of the API calls.'
  
paths:
  /login:
    get:
      tags:
        - login
      summary: 'Returns authentication object that contains valid token for the rest of the API calls.'
      description: ''
      operationId: login
      parameters:
        - name: rv-authorization
          in: header
          description: Base64 encode de user:password para la aplicación
          required: true
          schema:
            type: string
        - name: x-api-key
          in: header
          description: Api key
          required: true
          schema:
            type: string
      security:
        - api_key: []
      
      responses:
        '200':
          description: Successfully login
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      status:
                        type: integer
                        default: 200
                      message:
                        type: string
                      token:
                        type: string
        '401':
          description: Unauthorized user
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      status:
                        type: integer
                        default: 204
                      message:
                        type: string
        '500':
          description: Internal error
  '/create_client':
    post:
      tags:
        - create_client
      summary: Create a client to be able to tokenize their cards. Returns the client's token
      description: "To know the card tokenization process: https://paylands.docs.apiary.io/#introduction/sdk-javascript"
      operationId: createClient
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ClientRequest'
      parameters:
        - name: RV-SESS-T
          in: header
          description: 'auth token'
          schema:
            type: string
          required: true
      security:
        - api_key: []
      responses:
        '200':
          description: Client created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientResponse'
        '400':
          description: Error creating client
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 400
                    description: message code
                  message:
                    type: string
                    example: The customer_ext_id field is required.
                    description: message error
              
        '401':
          description: Access denied
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 401
                    description: message code
                  message:
                    type: string
                    example: Unauthorized
                    description: message error
        '500':
          description: Internal error
